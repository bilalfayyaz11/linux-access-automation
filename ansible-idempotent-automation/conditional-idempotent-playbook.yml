---
- name: Conditional Idempotent Operations
  hosts: managed
  become: yes

  tasks:
    - name: Check if custom configuration exists
      stat:
        path: /etc/custom-app.conf
      register: custom_config

    - name: Create initial configuration only if it does not exist
      copy:
        content: |
          # Custom Application Configuration
          app_name=MyApp
          version=1.0
          debug=false
        dest: /etc/custom-app.conf
        mode: '0644'
      when: not custom_config.stat.exists

    - name: Ensure log level line exists
      lineinfile:
        path: /etc/custom-app.conf
        regexp: '^log_level='
        line: 'log_level=info'
        state: present

    - name: Ensure debug is disabled
      replace:
        path: /etc/custom-app.conf
        regexp: '^debug=true'
        replace: 'debug=false'

    - name: Create backup only if config exists
      copy:
        src: /etc/custom-app.conf
        dest: /etc/custom-app.conf.backup
        remote_src: yes
        mode: '0644'
      when: custom_config.stat.exists

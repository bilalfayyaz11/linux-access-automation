---
- name: Multi-Vault ID Demonstration
  hosts: localhost

  vars_files:
    - team_dev_secrets.yml
    - db_secrets.yml

  tasks:
    - name: Show team-specific safe information
      debug:
        msg: |
          Team Lead: {{ team_lead_email }}
          Slack Webhook configured: {{ team_slack_webhook is defined }}

    - name: Show database safe information
      debug:
        msg: |
          Database Host: {{ db_host }}
          Database Name: {{ db_name }}

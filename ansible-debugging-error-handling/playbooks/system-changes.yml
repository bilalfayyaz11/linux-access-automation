---
- name: System Configuration Changes with Check Mode
  hosts: local
  become: true
  gather_facts: true

  tasks:
    - name: Install htop package
      ansible.builtin.dnf:
        name: htop
        state: present

    - name: Create application configuration file
      ansible.builtin.copy:
        content: |
          # Application Configuration
          debug_mode=true
          log_level=info
          max_connections=100
        dest: /etc/myapp.conf
        mode: '0644'

    - name: Create system application user
      ansible.builtin.user:
        name: appuser
        system: true
        shell: /bin/bash
        home: /opt/appuser

    - name: Start and enable chronyd service
      ansible.builtin.systemd:
        name: chronyd
        state: started
        enabled: true

    - name: Display completion message
      ansible.builtin.debug:
        msg: "System configuration completed successfully"

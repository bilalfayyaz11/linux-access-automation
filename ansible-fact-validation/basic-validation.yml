---
- name: Basic System Validation
  hosts: all
  gather_facts: yes

  tasks:
    - name: Validate minimum memory requirement
      assert:
        that:
          - ansible_memory_mb.real.total >= 1024
        fail_msg: "System has insufficient memory: {{ ansible_memory_mb.real.total }}MB"
        success_msg: "Memory requirement satisfied: {{ ansible_memory_mb.real.total }}MB"

    - name: Validate supported operating system
      assert:
        that:
          - ansible_distribution in ['CentOS', 'RedHat', 'Rocky', 'AlmaLinux', 'Fedora', 'Ubuntu', 'Debian']
        fail_msg: "Unsupported OS: {{ ansible_distribution }}"
        success_msg: "Supported OS detected: {{ ansible_distribution }}"

    - name: Check if system is 64-bit
      assert:
        that:
          - ansible_architecture == "x86_64"
        fail_msg: "Unsupported architecture: {{ ansible_architecture }}"
        success_msg: "64-bit architecture confirmed: {{ ansible_architecture }}"

    - name: Validate network connectivity facts
      assert:
        that:
          - ansible_default_ipv4 is defined
        fail_msg: "No default IPv4 facts found"
        success_msg: "Network facts collected successfully"

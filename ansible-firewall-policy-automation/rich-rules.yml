---
- name: Configure Firewall Rich Rules
  hosts: firewallnodes
  become: yes

  tasks:
    - name: Allow HTTP from private AWS network
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="172.31.0.0/16" service name="http" accept'
        permanent: yes
        immediate: yes
        state: enabled

    - name: Block example suspicious IP from SSH
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="172.31.255.250" service name="ssh" drop'
        permanent: yes
        immediate: yes
        state: enabled

    - name: Rate limit SSH connections
      ansible.posix.firewalld:
        rich_rule: 'rule service name="ssh" accept limit value="3/m"'
        permanent: yes
        immediate: yes
        state: enabled

    - name: Log and drop direct HTTP traffic from suspicious source
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="172.31.255.250" port port="80" protocol="tcp" log prefix="HTTP-DROP" level="info" drop'
        permanent: yes
        immediate: yes
        state: enabled

    - name: List all rich rules
      ansible.builtin.command: firewall-cmd --list-rich-rules
      register: rich_rules_output
      changed_when: false

    - name: Display configured rich rules
      ansible.builtin.debug:
        var: rich_rules_output.stdout_lines

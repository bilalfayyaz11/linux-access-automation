---
- name: Implement Firewall Security Policies
  hosts: firewallnodes
  become: yes

  tasks:
    - name: Ensure public zone exists
      ansible.posix.firewalld:
        zone: public
        permanent: yes
        state: present

    - name: Allow web-tier services
      ansible.posix.firewalld:
        zone: public
        service: "{{ item }}"
        permanent: yes
        immediate: yes
        state: enabled
      loop:
        - http
        - https
        - ssh

    - name: Allow custom application ports
      ansible.posix.firewalld:
        zone: public
        port: "{{ item }}"
        permanent: yes
        immediate: yes
        state: enabled
      loop:
        - 8080/tcp
        - 8443/tcp

    - name: Create internal zone
      ansible.posix.firewalld:
        zone: internal
        permanent: yes
        state: present

    - name: Reload firewalld after zone creation
      ansible.builtin.command: firewall-cmd --reload
      changed_when: true

    - name: Allow SSH in internal zone
      ansible.posix.firewalld:
        zone: internal
        service: ssh
        permanent: yes
        immediate: yes
        state: enabled

    - name: Allow MySQL only from AWS private subnet
      ansible.posix.firewalld:
        zone: internal
        rich_rule: 'rule family="ipv4" source address="172.31.0.0/16" port port="3306" protocol="tcp" accept'
        permanent: yes
        immediate: yes
        state: enabled

    - name: Drop all other MySQL traffic
      ansible.posix.firewalld:
        zone: internal
        rich_rule: 'rule port port="3306" protocol="tcp" drop'
        permanent: yes
        immediate: yes
        state: enabled

    - name: Block insecure legacy ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: yes
        immediate: yes
        state: disabled
      loop:
        - 23/tcp
        - 135/tcp
        - 139/tcp
        - 445/tcp

    - name: Enable dropped packet logging
      ansible.posix.firewalld:
        rich_rule: 'rule drop log prefix="FIREWALL-DROP" level="info"'
        permanent: yes
        immediate: yes
        state: enabled

    - name: Verify final firewall configuration
      ansible.builtin.command: firewall-cmd --list-all
      register: final_config
      changed_when: false

    - name: Display final firewall configuration
      ansible.builtin.debug:
        var: final_config.stdout_lines

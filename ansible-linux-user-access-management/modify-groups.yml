---
- name: Modify Linux user group memberships
  hosts: local
  become: yes
  tasks:
    - name: Add alice to testers group
      ansible.builtin.user:
        name: alice
        groups: developers,testers
        append: yes

    - name: Create project-alpha group
      ansible.builtin.group:
        name: project-alpha
        state: present
        gid: 3005

    - name: Add bob to project-alpha group
      ansible.builtin.user:
        name: bob
        groups: developers,project-alpha
        append: yes

    - name: Convert eve from contractor to developer access
      ansible.builtin.user:
        name: eve
        group: developers
        groups: developers
        append: no

    - name: Create sysadmins group
      ansible.builtin.group:
        name: sysadmins
        state: present
        gid: 3006

    - name: Add david to sysadmins group
      ansible.builtin.user:
        name: david
        groups: managers,developers,testers,sysadmins
        append: no

    - name: Display group memberships
      ansible.builtin.shell: |
        for user in alice bob carol david eve; do
          echo "User $user groups: $(groups $user)"
        done
      register: group_memberships
      changed_when: false

    - name: Show group membership information
      ansible.builtin.debug:
        msg: "{{ group_memberships.stdout_lines }}"
